<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whisper</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111;
      color: #ccc;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 56px 20px 40px;
    }

    h1   { font-size: 1.35rem; font-weight: 600; color: #fff; letter-spacing: -.02em; }
    .sub { color: #444; font-size: 0.8rem; margin-top: 4px; }

    /* ── Record button ──────────────────────────────────────── */
    #btn {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 2px solid #2a2a2a;
      background: #1c1c1c;
      cursor: pointer;
      margin: 36px 0 10px;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, border-color .2s, transform .15s;
      flex-shrink: 0;
    }
    #btn:hover          { transform: scale(1.06); border-color: #444; }
    #btn.rec            { background: #b71c1c; border-color: #e53935;
                          animation: ring 1.4s ease-in-out infinite; }
    #btn svg            { pointer-events: none; }

    @keyframes ring {
      0%,100% { box-shadow: 0 0 0 0   rgba(229,57,53,.35); }
      50%     { box-shadow: 0 0 0 16px rgba(229,57,53,0);   }
    }

    /* ── Status ──────────────────────────────────────────────── */
    #status           { font-size: .8rem; color: #444; height: 18px; }
    #status.rec       { color: #ef9a9a; }
    #status.busy      { color: #ffcc80; }

    /* ── Frequency visualizer ────────────────────────────────── */
    #vis {
      width: 100%; max-width: 700px; height: 44px;
      margin-top: 18px;
      opacity: 0; transition: opacity .35s;
    }
    #vis.show { opacity: 1; }

    /* ── Transcript box ──────────────────────────────────────── */
    #box {
      position: relative;
      width: 100%; max-width: 700px;
      background: #171717;
      border: 1px solid #222;
      border-radius: 14px;
      padding: 22px 22px 22px 22px;
      min-height: 180px;
      margin-top: 20px;
    }

    #final   { color: #e0e0e0; line-height: 1.8; white-space: pre-wrap; font-size: .97rem; }
    #partial { color: #555;    line-height: 1.8; white-space: pre-wrap; font-size: .97rem; font-style: italic; margin-top: 2px; }
    .ph      { color: #2d2d2d; font-style: italic; }

    /* ── Copy button ─────────────────────────────────────────── */
    #copy {
      position: absolute; top: 14px; right: 14px;
      background: #202020; border: 1px solid #2e2e2e; border-radius: 6px;
      color: #666; font-size: .72rem; padding: 4px 10px; cursor: pointer;
      display: none; transition: color .15s, background .15s;
    }
    #copy:hover        { background: #282828; color: #ccc; }
    #copy.show         { display: block; }

    /* ── Clear button ────────────────────────────────────────── */
    #clear {
      margin-top: 12px;
      background: none; border: 1px solid #222; border-radius: 6px;
      color: #444; font-size: .72rem; padding: 4px 12px; cursor: pointer;
      display: none; transition: color .15s, border-color .15s;
    }
    #clear:hover       { color: #aaa; border-color: #444; }
    #clear.show        { display: inline-block; }
  </style>
</head>
<body>

  <h1>🎙 Whisper </h1>
  <p class="sub">OpenAI Whisper · small · GPU</p>

  <button id="btn" aria-label="Toggle recording" title="Toggle recording">
    <!-- Mic icon -->
    <svg width="30" height="30" viewBox="0 0 24 24" fill="white">
      <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66
               1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16
               s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14
               .49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08
               c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/>
    </svg>
  </button>

  <div id="status">Click to start</div>

  <canvas id="vis" height="44"></canvas>

  <div id="box">
    <button id="copy">Copy</button>
    <div id="final"></div>
    <div id="partial"><span class="ph">Transcript will appear here…</span></div>
  </div>

  <button id="clear">Clear transcript</button>

  <script>
    const btn      = document.getElementById('btn');
    const statusEl = document.getElementById('status');
    const visEl    = document.getElementById('vis');
    const finalEl  = document.getElementById('final');
    const partialEl= document.getElementById('partial');
    const copyBtn  = document.getElementById('copy');
    const clearBtn = document.getElementById('clear');
    const visCtx   = visEl.getContext('2d');

    let recording    = false;
    let ws           = null;
    let recorder     = null;
    let rafId        = null;
    let firstPartial = true;

    // ── Helpers ────────────────────────────────────────────────────────────
    function setStatus(text, cls = '') {
      statusEl.textContent = text;
      statusEl.className   = cls;
    }

    // ── Frequency-bar visualizer ───────────────────────────────────────────
    function startVis(stream) {
      const ac       = new AudioContext();
      const source   = ac.createMediaStreamSource(stream);
      const analyser = ac.createAnalyser();
      analyser.fftSize = 128;
      source.connect(analyser);

      const buf = new Uint8Array(analyser.frequencyBinCount);
      visEl.width = visEl.clientWidth;
      visEl.classList.add('show');

      function draw() {
        rafId = requestAnimationFrame(draw);
        analyser.getByteFrequencyData(buf);
        visCtx.clearRect(0, 0, visEl.width, visEl.height);

        const barW = visEl.width / buf.length;
        buf.forEach((val, i) => {
          const h     = (val / 255) * visEl.height;
          const alpha = 0.35 + (val / 255) * 0.65;
          visCtx.fillStyle = `rgba(229,57,53,${alpha})`;
          visCtx.fillRect(i * barW, visEl.height - h, barW - 1, h);
        });
      }
      draw();
    }

    function stopVis() {
      cancelAnimationFrame(rafId);
      visEl.classList.remove('show');
      visCtx.clearRect(0, 0, visEl.width, visEl.height);
    }

    // ── Start recording ────────────────────────────────────────────────────
    async function start() {
      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch {
        setStatus('Microphone access denied ✗');
        return;
      }

      ws = new WebSocket(`ws://${location.host}/ws`);

      ws.onopen = () => {
        const mime = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg;codecs=opus']
          .find(t => MediaRecorder.isTypeSupported(t)) ?? '';

        recorder = new MediaRecorder(stream, mime ? { mimeType: mime } : {});

        recorder.ondataavailable = e => {
          if (e.data.size > 0 && ws.readyState === WebSocket.OPEN)
            ws.send(e.data);
        };

        recorder.start(1000); // 1-second slices
        recording    = true;
        firstPartial = true;
        btn.classList.add('rec');
        setStatus('Recording…', 'rec');
        startVis(stream);
      };

      ws.onmessage = ({ data }) => {
        const msg = JSON.parse(data);

        if (msg.type === 'partial') {
          if (firstPartial) { partialEl.innerHTML = ''; firstPartial = false; }
          partialEl.textContent = msg.text;

        } else if (msg.type === 'final') {
          partialEl.textContent = '';
          if (msg.text) {
            finalEl.textContent += (finalEl.textContent ? '\n' : '') + msg.text;
            copyBtn.classList.add('show');
            clearBtn.classList.add('show');
          }
          setStatus('Done — click to record again');
        }
      };

      ws.onerror = ()  => setStatus('Connection error ✗');
      ws.onclose = ()  => { if (recording) stop(false); };
    }

    // ── Stop recording ─────────────────────────────────────────────────────
    function stop(sendStop = true) {
      stopVis();
      if (recorder?.state !== 'inactive') {
        recorder.stop();
        recorder.stream.getTracks().forEach(t => t.stop());
      }
      if (sendStop && ws?.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'stop' }));
        setStatus('Transcribing…', 'busy');
      } else {
        setStatus('Click to start');
      }
      recording = false;
      btn.classList.remove('rec');
    }

    // ── Toggle ─────────────────────────────────────────────────────────────
    btn.addEventListener('click', () => recording ? stop() : start());

    // ── Copy ───────────────────────────────────────────────────────────────
    copyBtn.addEventListener('click', () => {
      const text = [finalEl.textContent, partialEl.textContent].filter(Boolean).join('\n');
      navigator.clipboard.writeText(text).then(() => {
        copyBtn.textContent = 'Copied!';
        setTimeout(() => copyBtn.textContent = 'Copy', 1500);
      });
    });

    // ── Clear ──────────────────────────────────────────────────────────────
    clearBtn.addEventListener('click', () => {
      finalEl.textContent  = '';
      partialEl.innerHTML  = '<span class="ph">Transcript will appear here…</span>';
      copyBtn.classList.remove('show');
      clearBtn.classList.remove('show');
    });
  </script>
</body>
</html>
